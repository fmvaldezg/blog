# -- Theme Options --

colorScheme = "one-light"
defaultAppearance = "light"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true

mainSections = ["posts"]
disableImageOptimization = false

highlightCurrentMenuArea = true

[header]
  layout = "fixed-fill-blur"  # basic, fixed, fixed-fill, fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true

[homepage]
  layout = "background"  # page, profile, hero, card, background, custom
  homepageImage = "img/background.jpg"
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "posts"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true

[article]
  showDate = true
  showViews = true
  showLikes = true
  showDateOnlyInArticle = false
  showDateUpdated = false
  showAuthor = true
  showHero = true
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 3
  showTaxonomies = true
  showAuthorsBadges = false
  showWordCount = true
  showSummary = true
  sharingLinks = ["linkedin", "twitter", "bluesky",  "email", "whatsapp", "facebook"]

[list]
  showHero = true
  showBreadcrumbs = false
  showSummary = true
  showViews = false
  showLikes = true
  showTableOfContents = false
  showCards = true
  groupByYear = true

[taxonomy]
  showTermCount = true
  showHero = false
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  cardView = false

